<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1F62D6">
  <meta name="description" content="Gestione Mezzi — flotta e manutenzioni per associazioni di volontariato">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gestione Mezzi">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Gestione Mezzi</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Prevent iOS Safari (and Android Chrome) from accumulating browser
    // history entries for in-app navigation. Without this patch, GoRouter
    // calls history.pushState() on every route change, so iOS swipe-back
    // triggers both Safari's native slide animation AND Flutter's own
    // transition — a visible "double snap". By converting every pushState
    // to replaceState the browser never has a previous entry to go back to,
    // so back navigation is handled exclusively by Flutter's in-app buttons.
    (function () {
      var _push = history.pushState.bind(history);
      history.pushState = function (state, title, url) {
        history.replaceState(state, title, url);
      };
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
