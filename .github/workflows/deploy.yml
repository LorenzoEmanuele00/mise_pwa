name: Deploy to Firebase Hosting

on:
  push:
    branches: [master]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2   # B5: pin versione per build riproducibili
          cache: true                # B5: cache pub/engine → build più veloci

      - name: Pub get
        run: flutter pub get

      - name: Analyze              # B5: gate — blocca il deploy su errori statici
        run: flutter analyze

      - name: Test                 # B5: gate — blocca il deploy su test falliti
        run: flutter test

      - name: Build web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bash build.sh

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MISE_PWA_247CA }}
          channelId: live
          projectId: mise-pwa-247ca
