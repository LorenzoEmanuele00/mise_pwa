<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestione Mezzi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Manrope:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --stage: #E6E9ED;
    --bg: #F1F3F6;
    --surface: #FFFFFF;
    --surface-2: #EEF1F5;
    --border: #E1E5EC;
    --hair: #EDF0F4;
    --text: #161B22;
    --text-2: #5A6473;
    --text-3: #98A1AE;
    --accent: #1F62D6;
    --accent-soft: #E2EBFB;
    --ok: #18A957;   --ok-fg: #0F7A3D;  --ok-bg: #E4F4EA;
    --warn: #E0920B; --warn-fg: #9A6206; --warn-bg: #FBEFD7;
    --bad: #E0463C;  --bad-fg: #C0362C;  --bad-bg: #FBE7E5;
    --info-fg: #2563C9; --info-bg: #E6EEFB;
    --sans: 'IBM Plex Sans', -apple-system, system-ui, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--stage);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* form controls */
  .gm-input {
    width: 100%; height: 50px; padding: 0 14px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 13px;
    font-family: var(--sans); font-size: 15px; color: var(--text);
    outline: none; -webkit-appearance: none; appearance: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .gm-input::placeholder { color: var(--text-3); }
  input.gm-input:focus, textarea.gm-input:focus, .gm-input:focus-within {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .gm-area { height: auto; padding: 12px 14px; line-height: 1.5; resize: none; }
  .gm-mono { font-family: var(--mono); letter-spacing: .3px; }
  .gm-select { display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; text-align: left; }
  textarea.gm-input { font-family: var(--sans); }

  /* press feedback */
  .gm-card-btn { transition: transform .08s ease, background .12s, border-color .12s; }
  .gm-card-btn:active { background: var(--surface-2); transform: scale(.992); }

  /* hide scrollbars inside the device */
  .gm-noscroll { scrollbar-width: none; -ms-overflow-style: none; }
  .gm-noscroll::-webkit-scrollbar { display: none; }
  div::-webkit-scrollbar { width: 0; height: 0; }

  /* screen transitions */
  @keyframes scrInR { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes scrInL { from { transform: translateX(-26%); opacity: .4; } to { transform: translateX(0); opacity: 1; } }
  .scr-push { animation: scrInR .26s cubic-bezier(.32,.72,0,1); }
  .scr-pop  { animation: scrInL .26s cubic-bezier(.32,.72,0,1); }
  @media (prefers-reduced-motion: reduce) { .scr-push, .scr-pop { animation: none; } }

  /* toast */
  @keyframes toastIn { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .gm-toast { animation: toastIn .22s cubic-bezier(.32,.72,0,1); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="gm-data.jsx"></script>
  <script type="text/babel" src="gm-ui.jsx"></script>
  <script type="text/babel" src="gm-config.jsx"></script>
  <script type="text/babel" src="gm-screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
